/**:
  ros__parameters:

    use_sim_time: true
    
    base_frame: "fossbot/base_footprint"
    odom_frame: "fossbot/odom"
    map_frame: "map"
    
    scan_topic: "/scan"
    odom_topic: "/odom"
    map_topic: "/map"
    
    mode: "mapping"
    
    scan_queue_size: 10
    throttle_scans: 1
    min_laser_range: 0.12
    max_laser_range: 12.0
    
    resolution: 0.05
    map_update_interval: 0.1

    tf_buffer_duration: 5.0
    transform_publish_period: 0.05
   
    occupancy_grid:
      free_thresh: 0.196
      occupied_thresh: 0.65
      
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 20.0
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_match_minimum_score: 0.9
    
    ros:
      qos_overrides:
        /scan:
          reliability: reliable
          durability: volatile
          depth: 50